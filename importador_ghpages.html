    function log(msg, tipo = "info") {
      const el = document.getElementById("log");
      el.style.display = "block";
      el.innerHTML += `<div class="${tipo}">${msg}</div>`;
      el.scrollTop = el.scrollHeight;
    }

    async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    window.iniciarImportacion = async function() {
      const btn = document.getElementById("btnImport");
      btn.disabled = true;
      btn.textContent = "Iniciando...";

      let db, uid;

      // Inicializar Firebase
      try {
        const app = initializeApp(FIREBASE_CONFIG);
        const auth = getAuth(app);
        db = getFirestore(app);
        log("✓ Firebase conectado", "ok");

        // Login con Google
        log("👤 Abriendo ventana de Google...", "info");
        const provider = new GoogleAuthProvider();
        const result = await signInWithPopup(auth, provider);
        uid = result.user.uid;
        log(`✓ Sesión iniciada como: ${result.user.email}`, "ok");
      } catch(e) {
        log("❌ Error de conexión: " + e.message, "err");
        log("   Asegúrate de abrir este archivo desde tu link de GitHub Pages.", "err");
        btn.disabled = false;
        btn.textContent = "Reintentar";
        return;
      }

      // ── Importar inventario ──
      log("\n📦 Importando inventario de controles...", "info");
      let okInv = 0;
      for (const item of INVENTARIO) {
        try {
          await addDoc(collection(db, "usuarios", uid, "inventario"), {
            ...item, creadoEn: serverTimestamp()
          });
          okInv++;
          await sleep(80);
        } catch(e) {
          log(`  ⚠ No se pudo importar "${item.nombre}": ${e.message}`, "err");
        }
      }
      log(`✓ Inventario: ${okInv} de ${INVENTARIO.length} controles importados`, "ok");

      // ── Importar trabajos ──
      log("\n🔑 Importando trabajos históricos...", "info");
      let okTrab = 0;
      for (let i = 0; i < TRABAJOS.length; i++) {
        const t = TRABAJOS[i];
        try {
          await addDoc(collection(db, "usuarios", uid, "trabajos"), {
            ...t, creadoEn: serverTimestamp()
          });
          okTrab++;
          if ((i + 1) % 20 === 0 || i === TRABAJOS.length - 1) {
            log(`  → ${i + 1} / ${TRABAJOS.length} trabajos subidos`, "info");
          }
          await sleep(80);
        } catch(e) {
          log(`  ⚠ Error en trabajo ${i+1} (${t.vehiculoMarca} ${t.vehiculoModelo}): ${e.message}`, "err");
        }
      }
      log(`✓ Trabajos: ${okTrab} de ${TRABAJOS.length} importados`, "ok");

      // ── Resumen final ──
      if (okTrab > 100) {
        log("\n🎉 ¡Importación completada con éxito!", "ok big");
        log("   Abre tu app y verás todos los datos. Puedes cerrar esta pestaña.", "ok");
        btn.textContent = "✓ Importación completada";
        btn.className = "done";
      } else {
        log("\n⚠ Algunos datos no se importaron. Revisa los errores arriba.", "err");
        btn.disabled = false;
        btn.textContent = "Reintentar";
      }
    };
